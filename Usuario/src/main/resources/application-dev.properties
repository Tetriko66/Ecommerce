server.port=8087
spring.application.name=Usuario

spring.datasource.url=jdbc:mysql://localhost:3307/db_perfil
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:DB/migration
spring.flyway.clean-disabled=false
spring.flyway.validate-on-migrate=false

jwt.secret=clave-super-secreta-larga-de-al-menos-32-caracteres

# Documentacion Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.enable-hateoas=false

# URL donde está publicado Eureka Server.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# true = este microservicio se registra en Eureka al iniciar.
eureka.client.register-with-eureka=true

# true = permite consultar el registro de servicios.
eureka.client.fetch-registry=true

# Publica preferentemente la IP del servicio en vez del hostname.
eureka.instance.prefer-ip-address=true
