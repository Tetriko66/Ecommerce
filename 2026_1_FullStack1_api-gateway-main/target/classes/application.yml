server:
  port: 8080

spring:
  application:
    name: API-GATEWAY
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            # Ruta pública de autenticación:
            # Cliente llama a http://localhost:8080/api/v1/auth/login
            # Gateway reenvía internamente a AUTH-SERVICE.
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/v1/auth/**

            # Ruta protegida de fiestas:
            # El header Authorization: Bearer <token> se reenvía al microservicio Fiesta.
            - id: usuario-service
              uri: lb://USUARIO
              predicates:
                - Path=/api/usuarios/**

            - id: carro-service
              uri: lb://Carro
              predicates:
                - Path=/carrito/**

            - id: pedido-service
              uri: lb://pedido
              predicates:
                - Path=/api/v1/pedidos/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
