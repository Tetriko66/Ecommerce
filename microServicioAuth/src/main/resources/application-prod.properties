# Nombre del microservicio.
spring.application.name=AUTH-SERVICE

# Puerto interno usado por Auth.
server.port=8083

# URL de MySQL dentro de Docker Compose. "mysql" es el nombre del servicio.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/db_usuario}

# Usuario de conexión.
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}

# Password de conexión.
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:system}

# Driver JDBC de MySQL.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate no crea tablas; Flyway ejecuta scripts SQL.
spring.jpa.hibernate.ddl-auto=none

# Activa migraciones Flyway al iniciar.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Clave JWT para firmar tokens.
jwt.secret=${JWT_SECRET:clave-super-secreta-para-clase-123456}
jwt.expiration=${JWT_EXPIRATION:3600000}
