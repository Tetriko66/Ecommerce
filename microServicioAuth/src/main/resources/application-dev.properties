# Puerto donde correrá el microservicio login
server.port=8083

# Nombre de la aplicación
spring.application.name=AUTH-SERVICE

# URL de conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/db_usuario

# Usuario de MySQL
spring.datasource.username=root

# Password de MySQL
spring.datasource.password=system

# Driver JDBC de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate no crea ni modifica tablas, porque eso lo hará Flyway
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL en consola
spring.jpa.show-sql=true

# Da formato legible al SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Activa Flyway al iniciar la aplicación
spring.flyway.enabled=true

# Permite iniciar Flyway aunque ya existan tablas
spring.flyway.baseline-on-migrate=true

# Ruta donde estarán los scripts SQL de migración
spring.flyway.locations=classpath:db/migration

# Permite ejecutar flyway clean si lo haces manualmente
spring.flyway.clean-disabled=false

# Clave secreta para firmar el JWT
jwt.secret=clave-super-secreta-para-clase-123456

# Tiempo de duración del token en milisegundos, 3600000 = 1 hora
jwt.expiration=3600000

# Documentacion Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

springdoc.enable-hateoas=false

# URL donde está publicado Eureka Server.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
 
# true = este microservicio se registra en Eureka al iniciar.
eureka.client.register-with-eureka=true
 
# true = permite consultar el registro de servicios.
# En Auth no es estrictamente necesario si no llama a otros servicios,
# pero se deja true para mantener una configuración simple y homogénea.
eureka.client.fetch-registry=true
 
# Publica preferentemente la IP del servicio en vez del hostname.
eureka.instance.prefer-ip-address=true
