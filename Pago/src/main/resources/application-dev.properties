# Puerto donde correrá el microservicio de pagos
server.port=8089

# Nombre de la aplicación
spring.application.name=Pago

# URL de conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3307/db_pago

# Usuario de MySQL
spring.datasource.username=root

# Password de MySQL
spring.datasource.password=

# Driver JDBC de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate no crea ni modifica tablas, porque eso lo hará Flyway
spring.jpa.hibernate.ddl-auto=none

# Muestra las consultas SQL en consola
spring.jpa.show-sql=true

# Da formato legible al SQL mostrado en consola
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de Hibernate para MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Activa Flyway al iniciar la aplicación
spring.flyway.enabled=true

# Permite iniciar Flyway aunque ya existan tablas
spring.flyway.baseline-on-migrate=true

# Ruta donde estarán los scripts SQL de migración
spring.flyway.locations=classpath:db/migration

# Permite ejecutar flyway clean si lo haces manualmente
spring.flyway.clean-disabled=false

jwt.secret=clave-super-secreta-para-clase-123456
