server.port=8084
spring.application.name=inventario

spring.datasource.url=jdbc:mysql://localhost:3307/db_inventario
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false

# URL del product-service para validación de productos
producto.service.url=http://localhost:8082

jwt.secret=clave-super-secreta-para-clase-123456
