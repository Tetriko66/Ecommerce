server.port=8088
spring.application.name=resena

spring.datasource.url=jdbc:mysql://localhost:3307/db_resena
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false

usuario.service.url=http://localhost:8087
producto.service.url=http://localhost:8082

jwt.secret=clave-super-secreta-para-clase-123456
