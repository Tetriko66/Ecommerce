server.port=8090
spring.application.name=pedido

spring.datasource.url=jdbc:mysql://localhost:3307/db_pedido
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false

# URLs de microservicios externos
inventario.service.url=http://localhost:8084
pago.service.url=http://localhost:8089

jwt.secret=clave-super-secreta-para-clase-123456
